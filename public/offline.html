<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CookTrace — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0A0B0F;
      color: #E8EAF0;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 340px; width: 100%;
      background: #111318;
      border: 1px solid #1E2330;
      border-radius: 20px;
      padding: 40px 32px;
    }
    .icon {
      font-size: 52px;
      line-height: 1;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }
    p {
      font-size: 15px;
      color: #6B7280;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .btn {
      display: inline-block;
      padding: 12px 28px;
      background: #00C47A;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 0.01em;
    }
    .btn:hover { background: #00A85E; }
    .tagline {
      margin-top: 24px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #00C47A;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Can't reach your server</h1>
    <p>CookTrace couldn't connect. Make sure your server is running and try again.</p>
    <button class="btn" onclick="window.location.reload()">Try again</button>
    <div class="tagline">CookTrace · Trace Every Bite</div>
  </div>
</body>
</html>

name: Build & Push to GHCR

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU lets the x86 GHA runner emulate ARM64 instructions during the
      # arm64 build leg. Required for cross-arch builds without a separate
      # arm64 runner. Adds a few minutes to total build time but covers the
      # Raspberry Pi 4 / Pi 5 audience. Mirrors NT's multi-arch setup
      # (TraceApps/nutritrace-dev commit e179225 for NT issue #76).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Multi-arch manifest. Skipping linux/arm/v7 (Pi 3 / 32-bit) —
          # audience too small to justify the test surface.
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/traceapps/cooktrace:latest
            ghcr.io/traceapps/cooktrace:${{ github.sha }}
